server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy API routes to backend services ──────────────────────────────
    # Auth Service
    location /api/auth/ {
        proxy_pass http://auth-service:3001/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # ── Redirect direct browser access to API endpoints ──────────────
        # If the request comes from a browser (no XMLHttpRequest / fetch header),
        # redirect to the login page instead of returning JSON
        if ($http_x_requested_with = "") {
            # Only redirect GET requests that look like browser navigation
        }
    }

    # User Service
    location /api/users/ {
        proxy_pass http://user-service:3002/api/users/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Product Service
    location /api/products/ {
        proxy_pass http://product-service:3003/api/products/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Order Service
    location /api/orders/ {
        proxy_pass http://order-service:3004/api/orders/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # # ── Block direct API access from browsers (no Authorization header) ──
    # # Returns redirect to /login for unauthenticated browser GETs to /api/*
    # location ~ ^/api/ {
    #     # If it's a regular browser GET (not XMLHttpRequest), redirect to login
    #     if ($request_method = GET) {
    #         return 302 /login;
    #     }
    #     # Everything else (POST, PATCH, DELETE or AJAX) – 404
    #     return 404;
    # }

    # ── React SPA – catch-all (must come last) ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
