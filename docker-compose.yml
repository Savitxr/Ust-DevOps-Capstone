services:

  mongo:
    image: mongo:7.0-jammy
    container_name: fanvault-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - fanvault-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    image: savitxr/fanvault-auth:latest
    container_name: fanvault-auth
    restart: unless-stopped
    env_file: ./auth-service/.env
    environment:
      PORT: 3001
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongo:27017/auth-db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - fanvault-net

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    image: savitxr/fanvault-user:latest
    container_name: fanvault-user
    restart: unless-stopped
    env_file: ./user-service/.env
    environment:
      PORT: 3002
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongo:27017/user-db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - fanvault-net

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    image: savitxr/fanvault-product:latest
    container_name: fanvault-product
    restart: unless-stopped
    env_file: ./product-service/.env
    environment:
      PORT: 3003
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongo:27017/product-db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - fanvault-net

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    image: savitxr/fanvault-order:latest
    container_name: fanvault-order
    restart: unless-stopped
    env_file: ./order-service/.env
    environment:
      PORT: 3004
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongo:27017/order-db?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_SERVICE_URL: http://email-service:3005
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      mongo:
        condition: service_healthy
      email-service:
        condition: service_healthy
    networks:
      - fanvault-net

  email-service:
    build:
      context: ./email-service
      dockerfile: Dockerfile
    image: savitxr/fanvault-email:latest
    container_name: fanvault-email
    restart: unless-stopped
    env_file: ./email-service/.env
    environment:
      PORT: 3005
      NODE_ENV: production
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    networks:
      - fanvault-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: savitxr/fanvault-frontend:latest
    container_name: fanvault-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - fanvault-net

volumes:
  mongo-data:
    name: fanvault-mongo-data

networks:
  fanvault-net:
    name: fanvault-network
    driver: bridge